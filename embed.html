
<html>
  <head>
    <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美國移民講座</title>
    
    <style>
        /* ========================================= */
        /* 1. 全局設定與重置 (Reset) */
        /* ========================================= */
        body, html {
            margin: 0;
            padding: 0;
            /* 讓網頁內容從邊緣開始，避免預設空白 */
        }
        
        /* ========================================= */
        /* 2. 視窗高度設定 (vh 單位應用) */
        /* ========================================= */
        /* 設置 HTML 和 BODY 佔滿整個視窗高度 */
        html, body {
            height: 100%; 
        }

        /* 首屏區塊：設定高度佔滿瀏覽器視窗 */
        .hero-section {
            height: 100vh; /* 佔滿 100% 視窗高度 */
            background-color: #2c3e50; /* 深藍色背景 */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            text-align: center;
        }

        /* ========================================= */
        /* 3. 主要內容區 (自適應內容與最小高度) */
        /* ========================================= */
        .main-content {
            width: 80%;
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            background-color: #ecf0f1; /* 淺灰色背景 */
            /* 設置最小高度，確保區塊視覺上不會太小 */
            min-height: 500px; 
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        /* ========================================= */
        /* 4. 響應式 IFRAME 設定 */
        /* ========================================= */
        .iframe-container {
            width: 100%;
            margin-top: 20px;
            border: 2px dashed #3498db;
            padding: 5px;
        }
        
        /* IFRAME 樣式：寬度 100% 自適應，固定高度 400px */
        .iframe-container iframe {
            width: 100%; /* 寬度自適應父容器 */
            height: 400px; /* 固定高度 400px */
            border: none;
            display: block;
        }
    </style>
  </head>
